<!doctype html>
<html lang="zh-Hant" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水溶液性質觀測站</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;family=Noto+Sans+TC:wght@500;700;900&amp;display=swap" rel="stylesheet">
  <style>
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: radial-gradient(ellipse at top, #0ea5e9 0%, #0c4a6e 45%, #082f49 100%);
    color: #f0f9ff;
    overflow-x: hidden;
  }
  .glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .page-section { display: none; opacity: 0; transform: translateY(15px); }
  .page-section.active { 
    display: block; 
    animation: fadeInSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes fadeInSlide { to { opacity: 1; transform: translateY(0); } }

  .nav-btn { 
    background: rgba(12, 74, 110, 0.6); 
    color: white; 
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .nav-btn.active { 
    background: #fde047 !important; 
    color: #0c4a6e !important; 
    box-shadow: 0 4px 12px rgba(253, 224, 71, 0.4);
    transform: translateY(-2px);
  }

  .beaker {
    width: 110px; height: 140px; position: relative;
    border: 4px solid rgba(255,255,255,0.7); border-top: none;
    border-radius: 0 0 22px 22px;
    background: linear-gradient(to bottom, transparent 0%, transparent 25%, var(--liq, #38bdf8) 25%, var(--liq, #38bdf8) 100%);
    box-shadow: inset 0 -10px 30px rgba(0,0,0,0.25), 0 10px 25px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  
  .litmus {
    width: 38px; height: 110px; border-radius: 4px;
    background: linear-gradient(to bottom, #fecaca 0%, #fecaca 50%, #bfdbfe 50%, #bfdbfe 100%);
  }
  .litmus.red-result { background: linear-gradient(to bottom, #fecaca 0%, #fecaca 50%, #ef4444 50%, #dc2626 100%); }
  .litmus.blue-result { background: linear-gradient(to bottom, #3b82f6 0%, #1d4ed8 50%, #bfdbfe 50%, #bfdbfe 100%); }
  
  .drop-zone { border: 3px dashed rgba(255,255,255,0.3); transition: all 0.3s; }
  .drop-zone.over { border-color: #fde047; background: rgba(253,224,71,0.1); }
  .shake { animation: shake 0.4s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .pop { animation: pop 0.4s ease; }
  @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  .info-text { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
 </head>
 <body class="h-full w-full">
  <main class="w-full h-full overflow-auto">
   <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">
    <header class="text-center mb-8">
     <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-2" style="text-shadow: 0 4px 0 rgba(0,0,0,0.25);">水溶液性質觀測站</h1>
     <p class="text-sky-200 text-base md:text-lg font-bold">互動式組成與性質分類教學系統</p>
    </header>

    <nav class="flex flex-wrap justify-center gap-4 mb-8">
     <button onclick="switchPage('lab-page', 'toLab')" id="toLab" class="nav-btn active font-black px-6 py-3 rounded-2xl"> <i data-lucide="test-tube-2" class="w-5 h-5 inline -mt-1"></i> 性質觀察室 </button>
     <button onclick="switchPage('comp-page', 'toComp')" id="toComp" class="nav-btn font-black px-6 py-3 rounded-2xl"> <i data-lucide="component" class="w-5 h-5 inline -mt-1"></i> 組成比例觀察 </button>
     <button onclick="switchPage('match-page', 'toMatch')" id="toMatch" class="nav-btn font-black px-6 py-3 rounded-2xl"> <i data-lucide="layout-grid" class="w-5 h-5 inline -mt-1"></i> 性質分類 </button>
     <button onclick="switchPage('comp-match-page', 'toCompMatch')" id="toCompMatch" class="nav-btn font-black px-6 py-3 rounded-2xl"> <i data-lucide="filter" class="w-5 h-5 inline -mt-1"></i> 組成比例分類 </button>
    </nav>

    <section id="lab-page" class="page-section active">
     <div class="glass rounded-3xl p-5 md:p-8">
      <h2 class="text-xl md:text-2xl font-black mb-4 text-yellow-300">選擇待測樣品</h2>
      <div id="solutionGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-sky-950/40 rounded-2xl p-6 flex flex-col items-center">
          <h3 class="font-bold mb-4 text-sky-200">石蕊試紙觀測</h3>
          <div id="litmusPaper" class="litmus mb-4"></div>
          <button id="testBtn" class="bg-yellow-300 text-sky-900 w-full font-black py-3 rounded-xl disabled:opacity-40 mb-3" disabled>檢測酸鹼</button>
          <p id="litmusText" class="text-xs font-bold text-center h-8 info-text"></p>
        </div>
        <div class="bg-sky-950/40 rounded-2xl p-6 flex flex-col items-center">
          <h3 class="font-bold mb-4 text-sky-200">紫色甘藍菜汁</h3>
          <div class="beaker mb-4" id="cabbageBeaker" style="--liq:#9333ea;"></div>
          <button id="cabbageBtn" class="bg-yellow-300 text-sky-900 w-full font-black py-3 rounded-xl disabled:opacity-40 mb-3" disabled>滴入菜汁</button>
          <p id="cabbageText" class="text-xs font-bold text-center h-8 info-text"></p>
        </div>
        <div class="bg-sky-950/40 rounded-2xl p-6 flex flex-col items-center">
          <h3 class="font-bold mb-4 text-sky-200">導電性質</h3>
          <div class="text-6xl mb-6 transition-all" id="conductivityIcon">💡</div>
          <button id="conductivityBtn" class="bg-yellow-300 text-sky-900 w-full font-black py-3 rounded-xl disabled:opacity-40 mb-3" disabled>通電檢測</button>
          <p id="condText" class="text-xs font-bold text-center h-8 info-text"></p>
        </div>
      </div>
     </div>
    </section>

    <section id="comp-page" class="page-section">
      <div class="glass rounded-3xl p-8">
        <h2 class="text-2xl font-black mb-6 text-yellow-300">溶液組成拆解</h2>
        <div id="compGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10"></div>
        <div id="compDisplay" class="hidden flex flex-col md:flex-row items-center justify-around gap-8 bg-sky-950/40 p-8 rounded-3xl">
          <div class="text-center"><div class="w-24 h-24 glass rounded-full flex items-center justify-center text-4xl mb-3 border border-white/20" id="soluteIcon"></div><p class="font-black">溶質：<span id="soluteName"></span></p></div>
          <div class="text-4xl font-black text-yellow-300">+</div>
          <div class="text-center"><div class="w-24 h-24 glass rounded-full flex items-center justify-center text-4xl mb-3 border border-sky-400/30 text-sky-300">💧</div><p class="font-black">溶劑：水</p></div>
          <div class="text-4xl font-black text-yellow-300">=</div>
          <div class="text-center"><div class="beaker mx-auto mb-3" id="finalBeaker"></div><p class="font-black">溶液：<span id="solutionName"></span></p></div>
        </div>
        <div id="compPlaceholder" class="text-center py-10 font-bold text-sky-300/50">請點選上方溶液進行拆解</div>
      </div>
    </section>

    <section id="match-page" class="page-section">
      <div class="glass rounded-3xl p-8">
        <h2 class="text-2xl font-black mb-6 text-yellow-300">性質歸類練習</h2>
        <div id="matchPool" class="flex flex-wrap gap-3 justify-center mb-8 min-h-[80px] p-4 bg-sky-950/40 rounded-2xl"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
          <div class="space-y-4">
            <h3 class="font-black text-sky-200 flex items-center gap-2"><i data-lucide="droplets"></i> 酸鹼性質</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div class="drop-zone rounded-xl p-4 min-h-[120px]" data-group="ph" data-type="acid"><h4 class="text-center text-xs font-black text-red-300 mb-2">🔴 酸性</h4><div class="match-items flex flex-wrap gap-1 justify-center"></div></div>
              <div class="drop-zone rounded-xl p-4 min-h-[120px]" data-group="ph" data-type="neutral"><h4 class="text-center text-xs font-black text-green-300 mb-2">⚪ 中性</h4><div class="match-items flex flex-wrap gap-1 justify-center"></div></div>
              <div class="drop-zone rounded-xl p-4 min-h-[120px]" data-group="ph" data-type="base"><h4 class="text-center text-xs font-black text-blue-300 mb-2">🔵 鹼性</h4><div class="match-items flex flex-wrap gap-1 justify-center"></div></div>
            </div>
          </div>
          <div class="space-y-4">
            <h3 class="font-black text-sky-200 flex items-center gap-2"><i data-lucide="zap"></i> 導電性質</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="drop-zone rounded-xl p-4 min-h-[120px]" data-group="cond" data-type="yes"><h4 class="text-center text-xs font-black text-yellow-300 mb-2">💡 可導電</h4><div class="match-items flex flex-wrap gap-1 justify-center"></div></div>
              <div class="drop-zone rounded-xl p-4 min-h-[120px]" data-group="cond" data-type="no"><h4 class="text-center text-xs font-black text-gray-400 mb-2">⚫ 不導電</h4><div class="match-items flex flex-wrap gap-1 justify-center"></div></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="comp-match-page" class="page-section">
      <div class="glass rounded-3xl p-8">
        <h2 class="text-2xl font-black mb-6 text-yellow-300">組成角色分類</h2>
        <div id="compMatchPool" class="flex flex-wrap gap-3 justify-center mb-8 min-h-[80px] p-4 bg-sky-950/40 rounded-2xl"></div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="drop-zone rounded-2xl p-6 min-h-[200px]" data-group="role" data-type="solute">
            <h4 class="text-center font-black text-orange-300 mb-4 border-b border-orange-300/20 pb-2">被溶解物質 (溶質)</h4>
            <div class="match-items flex flex-wrap gap-2 justify-center"></div>
          </div>
          <div class="drop-zone rounded-2xl p-6 min-h-[200px]" data-group="role" data-type="solvent">
            <h4 class="text-center font-black text-blue-300 mb-4 border-b border-blue-300/20 pb-2">溶解他物者 (溶劑)</h4>
            <div class="match-items flex flex-wrap gap-2 justify-center"></div>
          </div>
          <div class="drop-zone rounded-2xl p-6 min-h-[200px]" data-group="role" data-type="solution">
            <h4 class="text-center font-black text-green-300 mb-4 border-b border-green-300/20 pb-2">混合後的液體 (溶液)</h4>
            <div class="match-items flex flex-wrap gap-2 justify-center"></div>
          </div>
        </div>
        <div class="mt-6 text-center"><button onclick="initCompMatch()" class="text-xs text-sky-300 underline">重置組成分類</button></div>
      </div>
    </section>
   </div>
  </main>

  <script>
const solutions = [
  { id: 'vinegar', name: '食醋', ph: 'acid', cond: 'yes', color: '#fbbf24', emoji: '🍶', cabbage: '#ef4444', solute: '醋酸', sEmoji: '🧪' },
  { id: 'lemon', name: '檸檬汁', ph: 'acid', cond: 'yes', color: '#facc15', emoji: '🍋', cabbage: '#f43f5e', solute: '檸檬酸', sEmoji: '🍋' },
  { id: 'cola', name: '汽水', ph: 'acid', cond: 'yes', color: '#78350f', emoji: '🥤', cabbage: '#fb7185', solute: '二氧化碳', sEmoji: '💨' },
  { id: 'water', name: '純水', ph: 'neutral', cond: 'no', color: '#7dd3fc', emoji: '💧', cabbage: '#9333ea', solute: '水分子', sEmoji: '💧' },
  { id: 'salt', name: '食鹽水', ph: 'neutral', cond: 'yes', color: '#e0f2fe', emoji: '🧂', cabbage: '#9333ea', solute: '食鹽', sEmoji: '🧂' },
  { id: 'sugar', name: '糖水', ph: 'neutral', cond: 'no', color: '#fef3c7', emoji: '🍯', cabbage: '#9333ea', solute: '砂糖', sEmoji: '🍬' },
  { id: 'soap', name: '肥皂水', ph: 'base', cond: 'yes', color: '#c7d2fe', emoji: '🧼', cabbage: '#22c55e', solute: '肥皂分子', sEmoji: '🧼' },
  { id: 'ammonia', name: '氨水', ph: 'base', cond: 'yes', color: '#a5f3fc', emoji: '🧴', cabbage: '#10b981', solute: '氨氣', sEmoji: '☁️' },
];

let selectedSol = null;

function switchPage(pageId, btnId) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btnId).classList.add('active');
  if(pageId === 'comp-match-page') initCompMatch();
  lucide.createIcons();
}

function initGrids() {
  const labGrid = document.getElementById('solutionGrid');
  const compGrid = document.getElementById('compGrid');
  solutions.forEach(sol => {
    const card = document.createElement('button');
    card.className = 'sol-card glass rounded-2xl p-4 hover:bg-white/15 transition-all';
    card.innerHTML = `<div class="beaker mx-auto mb-2" style="--liq:${sol.color}"></div><div class="font-black text-sm">${sol.emoji} ${sol.name}</div>`;
    const labCard = card.cloneNode(true);
    labCard.onclick = () => {
      selectedSol = sol;
      document.querySelectorAll('#solutionGrid .sol-card').forEach(c => c.classList.remove('outline', 'outline-yellow-400'));
      labCard.classList.add('outline', 'outline-yellow-400');
      ['litmusText', 'cabbageText', 'condText'].forEach(id => document.getElementById(id).textContent = '');
      ['testBtn', 'cabbageBtn', 'conductivityBtn'].forEach(id => document.getElementById(id).disabled = false);
      document.getElementById('litmusPaper').className = 'litmus mb-4';
      document.getElementById('cabbageBeaker').style.setProperty('--liq', '#9333ea');
      document.getElementById('conductivityIcon').textContent = '💡';
      document.getElementById('conductivityIcon').style.filter = 'none';
    };
    labGrid.appendChild(labCard);
    const compCard = card.cloneNode(true);
    compCard.onclick = () => {
      document.getElementById('compPlaceholder').classList.add('hidden');
      const disp = document.getElementById('compDisplay');
      disp.classList.remove('hidden');
      disp.classList.add('pop');
      document.getElementById('soluteIcon').textContent = sol.sEmoji;
      document.getElementById('soluteName').textContent = sol.solute;
      document.getElementById('solutionName').textContent = sol.name;
      document.getElementById('finalBeaker').style.setProperty('--liq', sol.color);
      setTimeout(() => disp.classList.remove('pop'), 400);
    };
    compGrid.appendChild(compCard);
  });
}

function initPropMatch() {
  const pool = document.getElementById('matchPool');
  pool.innerHTML = '';
  solutions.forEach(s => {
    const tag = document.createElement('div');
    tag.className = 'bg-white/10 px-4 py-2 rounded-xl font-bold cursor-grab hover:bg-white/20 border border-white/5';
    tag.draggable = true;
    tag.textContent = s.emoji + ' ' + s.name;
    tag.ondragstart = (e) => e.dataTransfer.setData('text/plain', JSON.stringify({ text: s.name, ph: s.ph, cond: s.cond, emoji: s.emoji }));
    pool.appendChild(tag);
  });
}

function initCompMatch() {
  const pool = document.getElementById('compMatchPool');
  pool.innerHTML = '';
  document.querySelectorAll('#comp-match-page .match-items').forEach(i => i.innerHTML = '');
  const tasks = [];
  solutions.forEach(s => {
    if(s.id !== 'water') {
      tasks.push({ text: s.name, type: 'solution', emoji: s.emoji });
      tasks.push({ text: s.solute, type: 'solute', emoji: s.sEmoji });
    }
  });
  tasks.push({ text: '水', type: 'solvent', emoji: '💧' });
  tasks.sort(() => Math.random() - 0.5).forEach(task => {
    const tag = document.createElement('div');
    tag.className = 'bg-white/10 px-4 py-2 rounded-xl font-bold cursor-grab hover:bg-white/20 border border-white/10';
    tag.draggable = true;
    tag.innerHTML = `<span>${task.emoji}</span> <span>${task.text}</span>`;
    tag.ondragstart = (e) => e.dataTransfer.setData('text/plain', JSON.stringify({text: task.text, type: task.type, group: 'role', emoji: task.emoji}));
    pool.appendChild(tag);
  });
}

document.querySelectorAll('.drop-zone').forEach(zone => {
  zone.ondragover = e => { e.preventDefault(); zone.classList.add('over'); };
  zone.ondragleave = () => zone.classList.remove('over');
  zone.ondrop = e => {
    e.preventDefault();
    zone.classList.remove('over');
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    const group = zone.dataset.group;
    const targetType = zone.dataset.type;
    const isCorrect = (group === 'role' && data.type === targetType) || 
                      (group === 'ph' && data.ph === targetType) || 
                      (group === 'cond' && data.cond === targetType);
    if (isCorrect) {
      const itemsContainer = zone.querySelector('.match-items');
      if ([...itemsContainer.children].some(c => c.textContent.includes(data.text))) return;
      const chip = document.createElement('div');
      chip.className = 'bg-white/20 px-2 py-1 rounded text-[10px] font-bold pop border border-white/10';
      chip.innerHTML = `${data.emoji} ${data.text}`;
      itemsContainer.appendChild(chip);
    } else {
      zone.classList.add('shake', 'bg-red-500/20');
      setTimeout(() => zone.classList.remove('shake', 'bg-red-500/20'), 400);
    }
  };
});

document.getElementById('testBtn').onclick = () => {
  const p = document.getElementById('litmusPaper');
  const t = document.getElementById('litmusText');
  let res = "";
  if (selectedSol.ph === 'acid') { p.className = 'litmus mb-4 red-result'; res = "變為紅色，此溶液呈酸性"; t.className = "text-xs font-bold text-center h-8 info-text text-red-400"; }
  else if (selectedSol.ph === 'base') { p.className = 'litmus mb-4 blue-result'; res = "變為藍色，此溶液呈鹼性"; t.className = "text-xs font-bold text-center h-8 info-text text-blue-400"; }
  else { p.className = 'litmus mb-4'; res = "不變色，此溶液呈中性"; t.className = "text-xs font-bold text-center h-8 info-text text-green-400"; }
  t.textContent = res; p.classList.add('shake'); setTimeout(() => p.classList.remove('shake'), 400);
};

document.getElementById('cabbageBtn').onclick = () => {
  const b = document.getElementById('cabbageBeaker');
  const t = document.getElementById('cabbageText');
  b.style.setProperty('--liq', selectedSol.cabbage);
  let res = selectedSol.ph === 'acid' ? "變為偏紅色系 (酸性)" : (selectedSol.ph === 'base' ? "變為偏綠色系 (鹼性)" : "維持紫色 (中性)");
  t.className = `text-xs font-bold text-center h-8 info-text ${selectedSol.ph==='acid'?'text-red-400':(selectedSol.ph==='base'?'text-green-400':'text-purple-400')}`;
  t.textContent = res; b.classList.add('pop'); setTimeout(() => b.classList.remove('pop'), 400);
};

document.getElementById('conductivityBtn').onclick = () => {
  const icon = document.getElementById('conductivityIcon');
  const t = document.getElementById('condText');
  if(selectedSol.cond === 'yes') {
    icon.textContent = '💡✨'; icon.style.filter = 'drop-shadow(0 0 15px #fde047)';
    t.textContent = "燈泡發光，此溶液可導電 (電解質)"; t.className = "text-xs font-bold text-center h-8 info-text text-yellow-300";
  } else {
    icon.textContent = '⚫'; icon.style.filter = 'none';
    t.textContent = "燈泡不亮，此溶液不導電 (非電解質)"; t.className = "text-xs font-bold text-center h-8 info-text text-gray-400";
  }
  icon.classList.add('pop'); setTimeout(() => icon.classList.remove('pop'), 400);
};

window.onload = () => { initGrids(); initPropMatch(); lucide.createIcons(); };
  </script>
 </body>
</html>
