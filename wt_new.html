<!doctype html>
<html lang="zh-Hant" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水溶液性質觀測站</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;family=Noto+Sans+TC:wght@500;700;900&amp;display=swap" rel="stylesheet">
  <style>
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: radial-gradient(ellipse at top, #0ea5e9 0%, #0c4a6e 45%, #082f49 100%);
    color: #f0f9ff;
    overflow-x: hidden;
  }
  .glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .beaker {
    width: 110px;
    height: 140px;
    position: relative;
    border: 4px solid rgba(255,255,255,0.7);
    border-top: none;
    border-radius: 0 0 22px 22px;
    background: linear-gradient(to bottom, transparent 0%, transparent 25%, var(--liq, #38bdf8) 25%, var(--liq, #38bdf8) 100%);
    box-shadow: inset 0 -10px 30px rgba(0,0,0,0.25), 0 10px 25px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .beaker::before {
    content: "";
    position: absolute;
    top: 25%;
    left: 0;
    right: 0;
    height: 10px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    animation: ripple 3s ease-in-out infinite;
  }
  .beaker::after {
    content: "";
    position: absolute;
    top: -4px;
    left: -8px;
    right: -8px;
    height: 8px;
    background: rgba(255,255,255,0.7);
    border-radius: 4px;
  }
  @keyframes ripple {
    0%, 100% { transform: translateY(0) scaleX(1); opacity: 0.35; }
    50% { transform: translateY(-3px) scaleX(0.95); opacity: 0.55; }
  }
  .sol-card:hover .beaker { transform: scale(1.05) rotate(-2deg); transition: 0.3s; }
  .sol-card.selected { outline: 3px solid #fde047; outline-offset: 4px; }
  
  .nav-btn.active { background: #fde047; color: #0c4a6e; box-shadow: 0 6px 0 #ca8a04; }
  .page-section { display: none; }
  .page-section.active { display: block; }
  .pop { animation: pop 0.4s ease; }
  @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  .shake { animation: shake 0.4s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  
  .btn-yellow { background: #fde047; color: #0c4a6e; box-shadow: 0 6px 0 #ca8a04; transition: all 0.15s; }
  .btn-yellow:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #ca8a04; }
  .btn-yellow:active { transform: translateY(4px); box-shadow: 0 2px 0 #ca8a04; }
  
  .drop-zone { border: 3px dashed rgba(255,255,255,0.4); transition: all 0.2s; }
  .drop-zone.over { border-color: #fde047; background: rgba(253,224,71,0.15); }
  .drop-zone.correct { border-color: #4ade80; background: rgba(74,222,128,0.2); }
  .drop-zone.wrong { border-color: #f87171; background: rgba(248,113,113,0.2); }
  .draggable { cursor: grab; }
  
  .litmus {
    width: 38px;
    height: 110px;
    border-radius: 4px;
    background: linear-gradient(to bottom, #fecaca 0%, #fecaca 50%, #bfdbfe 50%, #bfdbfe 100%);
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .litmus.red-result { background: linear-gradient(to bottom, #fecaca 0%, #fecaca 50%, #ef4444 50%, #dc2626 100%); }
  .litmus.blue-result { background: linear-gradient(to bottom, #3b82f6 0%, #1d4ed8 50%, #bfdbfe 50%, #bfdbfe 100%); }
  .litmus.neutral-result { background: linear-gradient(to bottom, #fecaca 0%, #fecaca 50%, #bfdbfe 50%, #bfdbfe 100%); }
</style>
 </head>
 <body class="h-full w-full">
  <main class="w-full h-full overflow-auto">
   <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">
    <header class="text-center mb-8">
     <div class="inline-flex items-center gap-3 bg-sky-400/30 text-white px-4 py-1 rounded-full text-sm font-black mb-3">
      <i data-lucide="flask-conical" class="w-4 h-4"></i> <span>科學觀察模擬器</span>
     </div>
     <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-2" style="text-shadow: 0 4px 0 rgba(0,0,0,0.25);">水溶液性質觀測站</h1>
     <p class="text-sky-200 text-base md:text-lg font-bold">指示劑變色反應與物理性質模擬</p>
    </header>

    <nav class="flex flex-wrap justify-center gap-4 mb-6">
     <button id="toLab" class="nav-btn active font-black px-6 py-3 rounded-2xl bg-yellow-300 text-sky-900 transition-all"> <i data-lucide="test-tube-2" class="w-5 h-5 inline -mt-1"></i> 性質觀察室 </button>
     <button id="toComposition" class="nav-btn font-black px-6 py-3 rounded-2xl bg-white/10 text-white transition-all hover:bg-white/20"> <i data-lucide="component" class="w-5 h-5 inline -mt-1"></i> 組成比例觀測 </button>
     <button id="toMatch" class="nav-btn font-black px-6 py-3 rounded-2xl bg-white/10 text-white transition-all hover:bg-white/20"> <i data-lucide="layout-grid" class="w-5 h-5 inline -mt-1"></i> 溶液性質分類 </button>
    </nav>

    <section id="lab-page" class="page-section active">
     <div class="glass rounded-3xl p-5 md:p-8">
      <h2 class="text-xl md:text-2xl font-black mb-4 flex items-center gap-2"><span class="bg-yellow-300 text-sky-900 w-8 h-8 rounded-full inline-flex items-center justify-center">1</span> 選擇待測樣品</h2>
      <div id="solutionGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
      
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-sky-950/40 rounded-2xl p-6 flex flex-col items-center">
          <h3 class="font-bold mb-4 text-sky-200 underline decoration-yellow-400 underline-offset-4">石蕊試紙觀測</h3>
          <div id="litmusPaper" class="litmus mb-4"></div>
          <button id="testBtn" class="btn-yellow w-full font-black py-3 rounded-xl disabled:opacity-40" disabled>檢測酸鹼</button>
          <div id="resultBox" class="mt-4 text-xs font-bold text-center hidden"></div>
        </div>

        <div class="bg-sky-950/40 rounded-2xl p-6 flex flex-col items-center">
          <h3 class="font-bold mb-4 text-sky-200 underline decoration-purple-400 underline-offset-4">紫色甘藍菜汁測試</h3>
          <div class="beaker mb-4" id="cabbageBeaker" style="--liq:#9333ea;"></div>
          <button id="cabbageBtn" class="btn-yellow w-full font-black py-3 rounded-xl disabled:opacity-40" disabled>滴入菜汁</button>
          <div id="cabbageResultBox" class="mt-4 text-xs font-bold text-center hidden"></div>
        </div>

        <div class="bg-sky-950/40 rounded-2xl p-6 flex flex-col items-center">
          <h3 class="font-bold mb-4 text-sky-200 underline decoration-blue-400 underline-offset-4">導電性質觀測</h3>
          <div class="text-6xl mb-6 py-2" id="conductivityIcon">💡</div>
          <button id="conductivityBtn" class="btn-yellow w-full font-black py-3 rounded-xl disabled:opacity-40" disabled>通電檢測</button>
          <div id="conductivityResultBox" class="mt-4 text-xs font-bold text-center hidden"></div>
        </div>
      </div>
      <div class="mt-8 text-center">
        <button id="resetBtn" class="bg-white/10 hover:bg-white/20 font-bold px-10 py-2 rounded-2xl text-sm border border-white/20">重置樣品</button>
      </div>
     </div>
    </section>

    <section id="composition-page" class="page-section">
      <div class="glass rounded-3xl p-5 md:p-8">
       <h2 class="text-xl md:text-2xl font-black mb-4 flex items-center gap-2"><span class="bg-yellow-300 text-sky-900 w-8 h-8 rounded-full inline-flex items-center justify-center">2</span> 溶液組成拆解</h2>
       <div id="compGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
       
       <div class="bg-sky-950/40 rounded-3xl p-8 relative overflow-hidden min-h-[350px]">
         <div id="compPlaceholder" class="absolute inset-0 flex items-center justify-center text-sky-400/50 font-bold">請在上方選擇一種溶液開始拆解</div>
         
         <div id="compDisplay" class="hidden flex flex-col md:flex-row items-center justify-around gap-8">
           <div class="text-center">
             <div class="text-xs font-black text-red-300 mb-2">SOLUTE 溶質</div>
             <div class="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center text-4xl shadow-xl border border-white/20" id="soluteIcon"></div>
             <div class="mt-3 font-black text-lg" id="soluteName"></div>
           </div>
           
           <div class="text-4xl text-yellow-300 font-black">+</div>
           
           <div class="text-center">
             <div class="text-xs font-black text-blue-300 mb-2">SOLVENT 溶劑</div>
             <div class="w-24 h-24 bg-sky-400/20 rounded-full flex items-center justify-center text-4xl shadow-xl border border-sky-400/20" id="solventIcon">💧</div>
             <div class="mt-3 font-black text-lg" id="solventName">水</div>
           </div>
           
           <div class="text-4xl text-yellow-300 font-black">=</div>
           
           <div class="text-center">
             <div class="text-xs font-black text-green-300 mb-2">SOLUTION 溶液</div>
             <div class="beaker mx-auto" id="finalBeaker"></div>
             <div class="mt-3 font-black text-lg" id="solutionName"></div>
           </div>
         </div>
       </div>
       
       <div class="mt-8 glass p-6 rounded-2xl">
         <h4 class="font-black text-yellow-300 mb-2 flex items-center gap-2"><i data-lucide="info"></i> 科學小筆記：</h4>
         <p class="text-sm text-sky-100 leading-relaxed">
           水溶液是由被溶解的物質（稱為<b>溶質</b>）與用來溶解的物質（稱為<b>溶劑</b>，通常是水）混合而成的均勻混合物。
           公式：<span class="bg-white/10 px-2 py-0.5 rounded text-white">溶質 + 溶劑 = 溶液</span>
         </p>
       </div>
      </div>
    </section>

    <section id="match-page" class="page-section">
     <div class="glass rounded-3xl p-5 md:p-8">
      <h2 class="text-xl md:text-2xl font-black mb-2">性質歸類觀測</h2>
      <p class="text-sky-200 mb-6 text-sm">請將樣品拖曳至對應區域（每個樣品在各群組限歸類一次）</p>
      <div id="matchPool" class="flex flex-wrap gap-3 justify-center mb-8 min-h-[100px] p-4 bg-sky-950/40 rounded-2xl"></div>
      
      <h3 class="font-black mb-4 flex items-center gap-2 text-yellow-300"><i data-lucide="filter"></i> 酸鹼性質分類</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
       <div class="drop-zone rounded-2xl p-4 min-h-[120px]" data-group="ph" data-type="acid">
        <div class="text-center font-black text-sm mb-2 text-red-300">🔴 酸性</div>
        <div class="match-items flex flex-wrap gap-2 justify-center" id="ph-acid"></div>
       </div>
       <div class="drop-zone rounded-2xl p-4 min-h-[120px]" data-group="ph" data-type="neutral">
        <div class="text-center font-black text-sm mb-2 text-green-300">⚪ 中性</div>
        <div class="match-items flex flex-wrap gap-2 justify-center" id="ph-neutral"></div>
       </div>
       <div class="drop-zone rounded-2xl p-4 min-h-[120px]" data-group="ph" data-type="base">
        <div class="text-center font-black text-sm mb-2 text-blue-300">🔵 鹼性</div>
        <div class="match-items flex flex-wrap gap-2 justify-center" id="ph-base"></div>
       </div>
      </div>

      <h3 class="font-black mb-4 flex items-center gap-2 text-yellow-300"><i data-lucide="zap"></i> 導電性質分類</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
       <div class="drop-zone rounded-2xl p-4 min-h-[120px]" data-group="cond" data-type="yes">
        <div class="text-center font-black text-sm mb-2 text-yellow-300">⚡ 導電</div>
        <div class="match-items flex flex-wrap gap-2 justify-center" id="cond-yes"></div>
       </div>
       <div class="drop-zone rounded-2xl p-4 min-h-[120px]" data-group="cond" data-type="no">
        <div class="text-center font-black text-sm mb-2 text-gray-400">❌ 不導電</div>
        <div class="match-items flex flex-wrap gap-2 justify-center" id="cond-no"></div>
       </div>
      </div>

      <div class="mt-8 text-center">
       <button id="matchReset" class="bg-white/10 hover:bg-white/20 font-bold px-6 py-3 rounded-2xl border border-white/10"> 重新開始 </button>
      </div>
     </div>
    </section>
   </div>
  </main>

  <script>
// 擴充資料：加入溶質(solute)與溶劑(solvent)資訊
const solutions = [
  { id: 'vinegar', name: '食醋', ph: 'acid', cond: 'yes', color: '#fbbf24', emoji: '🍶', cabbage: '#ef4444', solute: '醋酸', soluteEmoji: '🧪' },
  { id: 'lemon', name: '檸檬汁', ph: 'acid', cond: 'yes', color: '#facc15', emoji: '🍋', cabbage: '#f43f5e', solute: '檸檬酸', soluteEmoji: '🍋' },
  { id: 'cola', name: '汽水', ph: 'acid', cond: 'yes', color: '#78350f', emoji: '🥤', cabbage: '#fb7185', solute: '二氧化碳', soluteEmoji: '💨' },
  { id: 'water', name: '純水', ph: 'neutral', cond: 'no', color: '#7dd3fc', emoji: '💧', cabbage: '#9333ea', solute: '無(純物質)', soluteEmoji: '🚫' },
  { id: 'salt', name: '食鹽水', ph: 'neutral', cond: 'yes', color: '#e0f2fe', emoji: '🧂', cabbage: '#9333ea', solute: '食鹽', soluteEmoji: '🧂' },
  { id: 'sugar', name: '糖水', ph: 'neutral', cond: 'no', color: '#fef3c7', emoji: '🍯', cabbage: '#9333ea', solute: '砂糖', soluteEmoji: '🍬' },
  { id: 'soap', name: '肥皂水', ph: 'base', cond: 'yes', color: '#c7d2fe', emoji: '🧼', cabbage: '#22c55e', solute: '肥皂分子', soluteEmoji: '🧼' },
  { id: 'ammonia', name: '氨水', ph: 'base', cond: 'yes', color: '#a5f3fc', emoji: '🧴', cabbage: '#10b981', solute: '氨氣', soluteEmoji: '☁️' },
];

let selectedSol = null;
let userMatches = {}; 

// Navigation
function switchPage(pageId, btnId) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btnId).classList.add('active');
}
document.getElementById('toLab').onclick = () => switchPage('lab-page', 'toLab');
document.getElementById('toComposition').onclick = () => switchPage('composition-page', 'toComposition');
document.getElementById('toMatch').onclick = () => switchPage('match-page', 'toMatch');

// Lab Logic (與原本相同)
const solGrid = document.getElementById('solutionGrid');
const compGrid = document.getElementById('compGrid');

solutions.forEach(sol => {
  // 性質觀察室的卡片
  const card = document.createElement('button');
  card.className = 'sol-card glass rounded-2xl p-4 hover:bg-white/15 transition-all';
  card.innerHTML = `<div class="beaker mx-auto mb-2" style="--liq:${sol.color}"></div><div class="font-black text-sm">${sol.emoji} ${sol.name}</div>`;
  card.onclick = () => {
    selectedSol = sol;
    document.querySelectorAll('#solutionGrid .sol-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    document.getElementById('testBtn').disabled = false;
    document.getElementById('cabbageBtn').disabled = false;
    document.getElementById('conductivityBtn').disabled = false;
    resetDisplays();
  };
  solGrid.appendChild(card);

  // 組成比例觀測的卡片 (複製邏輯)
  const compCard = card.cloneNode(true);
  compCard.onclick = () => {
    document.querySelectorAll('#compGrid .sol-card').forEach(c => c.classList.remove('selected'));
    compCard.classList.add('selected');
    showComposition(sol);
  };
  compGrid.appendChild(compCard);
});

function showComposition(sol) {
  document.getElementById('compPlaceholder').classList.add('hidden');
  const display = document.getElementById('compDisplay');
  display.classList.remove('hidden');
  display.classList.add('pop');
  
  document.getElementById('soluteIcon').textContent = sol.soluteEmoji;
  document.getElementById('soluteName').textContent = sol.solute;
  document.getElementById('solutionName').textContent = sol.name;
  document.getElementById('finalBeaker').style.setProperty('--liq', sol.color);
  
  setTimeout(() => display.classList.remove('pop'), 400);
}

function resetDisplays() {
  document.getElementById('resultBox').classList.add('hidden');
  document.getElementById('cabbageResultBox').classList.add('hidden');
  document.getElementById('conductivityResultBox').classList.add('hidden');
  document.getElementById('litmusPaper').className = 'litmus mb-4';
  document.getElementById('cabbageBeaker').style.setProperty('--liq', '#9333ea');
  document.getElementById('conductivityIcon').textContent = '💡';
}

document.getElementById('testBtn').onclick = () => {
  const paper = document.getElementById('litmusPaper');
  const box = document.getElementById('resultBox');
  paper.className = 'litmus mb-4 ' + (selectedSol.ph === 'acid' ? 'red-result' : selectedSol.ph === 'base' ? 'blue-result' : 'neutral-result');
  box.innerHTML = selectedSol.ph === 'acid' ? '藍色轉紅色：酸性' : selectedSol.ph === 'base' ? '紅色轉藍色：鹼性' : '無顏色變化：中性';
  box.classList.remove('hidden');
  paper.classList.add('shake');
  setTimeout(() => paper.classList.remove('shake'), 400);
};

document.getElementById('cabbageBtn').onclick = () => {
  const b = document.getElementById('cabbageBeaker');
  const box = document.getElementById('cabbageResultBox');
  b.style.setProperty('--liq', selectedSol.cabbage);
  box.innerHTML = `呈現 ${selectedSol.ph === 'acid' ? '紅/粉色' : selectedSol.ph === 'base' ? '綠/藍色' : '紫色'}`;
  box.classList.remove('hidden');
  b.classList.add('pop');
  setTimeout(() => b.classList.remove('pop'), 400);
};

document.getElementById('conductivityBtn').onclick = () => {
  const icon = document.getElementById('conductivityIcon');
  const box = document.getElementById('conductivityResultBox');
  icon.textContent = selectedSol.cond === 'yes' ? '💡✨' : '💡';
  box.innerHTML = selectedSol.cond === 'yes' ? '燈泡亮起：可導電' : '燈泡不亮：不導電';
  box.classList.remove('hidden');
  icon.classList.add('pop');
  setTimeout(() => icon.classList.remove('pop'), 400);
};

document.getElementById('resetBtn').onclick = () => {
  selectedSol = null;
  document.querySelectorAll('.sol-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('testBtn').disabled = true;
  document.getElementById('cabbageBtn').disabled = true;
  document.getElementById('conductivityBtn').disabled = true;
  resetDisplays();
};

// Match Logic (與原本相同)
function initMatch() {
  const pool = document.getElementById('matchPool');
  pool.innerHTML = '';
  userMatches = {};
  document.querySelectorAll('.match-items').forEach(mi => mi.innerHTML = '');
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('correct', 'wrong'));
  solutions.forEach(sol => createChip(sol));
}

function createChip(sol) {
  const pool = document.getElementById('matchPool');
  const chip = document.createElement('div');
  chip.id = `chip-${sol.id}`;
  chip.className = 'draggable bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl px-4 py-2 font-black text-sm flex items-center gap-2 transition-all cursor-grab';
  chip.draggable = true;
  chip.innerHTML = `<span>${sol.emoji}</span><span>${sol.name}</span>`;
  chip.ondragstart = (e) => e.dataTransfer.setData('solId', sol.id);
  pool.appendChild(chip);
}

document.querySelectorAll('.drop-zone').forEach(zone => {
  zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('over'); };
  zone.ondragleave = () => zone.classList.remove('over');
  zone.ondrop = (e) => {
    e.preventDefault();
    zone.classList.remove('over');
    const id = e.dataTransfer.getData('solId');
    const sol = solutions.find(s => s.id === id);
    const group = zone.dataset.group;
    const type = zone.dataset.type;

    const isCorrect = (group === 'ph' && sol.ph === type) || (group === 'cond' && sol.cond === type);

    if (isCorrect) {
      if (userMatches[id] && userMatches[id][group]) {
        const oldType = userMatches[id][group];
        const oldContainer = document.getElementById(`${group}-${oldType}`);
        const oldItem = oldContainer.querySelector(`[data-sol-id="${id}"]`);
        if (oldItem) oldItem.remove();
      }
      if (!userMatches[id]) userMatches[id] = {};
      userMatches[id][group] = type;

      const chip = document.createElement('div');
      chip.dataset.solId = id;
      chip.className = 'bg-white/20 rounded-lg px-2 py-1 text-[10px] font-bold pop flex items-center gap-1';
      chip.innerHTML = `<span>${sol.emoji}</span><span>${sol.name}</span>`;
      zone.querySelector('.match-items').appendChild(chip);
      zone.classList.add('correct');
      setTimeout(() => zone.classList.remove('correct'), 500);

      if (userMatches[id].ph && userMatches[id].cond) {
        const originalChip = document.getElementById(`chip-${id}`);
        if (originalChip) originalChip.classList.add('hidden');
      }
    } else {
      zone.classList.add('wrong', 'shake');
      setTimeout(() => zone.classList.remove('wrong', 'shake'), 500);
    }
  };
});

document.getElementById('matchReset').onclick = initMatch;
initMatch();
lucide.createIcons();
  </script>
 </body>
</html>
